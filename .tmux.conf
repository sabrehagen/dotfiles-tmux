# Clear all keybindings
unbind -a

# Eliminate delay between escape key and subsequent characters
set -s escape-time 0

# Pass through extended key sequences to applications that opt in
set -s extended-keys on
set -g extended-keys-format csi-u

# Allow applications to send escape sequences to the outer terminal
set -g allow-passthrough on

# Use a modern terminal
set -g default-terminal tmux-256color

# Enable focus events
set -g focus-events on

# Set status message display timeout
set -g display-time 1300

# Increase scrollback buffer size
set -g history-limit 50000

# Enable terminal clipboard control
set -g set-clipboard on

# Start window numbering at 1
set -g base-index 1

# Start pane numbering at 1
set -g pane-base-index 1

# Refresh window numbers when a window is closed
set -g renumber-windows on

# Enable mouse support
set -g mouse on

# Use vim style key bindings
set -g mode-keys vi
set -g status-keys vi

# Exclude small clients viewing in background mode from limiting larger clients maximum size
setw -g aggressive-resize on

# Active pane colours
set -g window-active-style fg=colour231,bg=colour0
set -g pane-active-border-style fg=colour15,bg=default

# Inactive pane colours
set -g window-style fg=colour250,bg=colour232
set -g pane-border-style fg=colour242,bg=default

# Pane border title
set -g pane-border-format '#(ps --no-headers -t #{pane_tty} -o args -O-c)'

# Pane border off by default
set -g pane-border-status off

# Status bar colours
set -g status-style fg=magenta,bg=colour235

# Left status bar colours
set -g status-left-style fg=magenta,bg=colour234

# Right status bar colours
set -g status-right-style fg=colour240,bg=default,default

# Tab colours
setw -g window-status-style fg=magenta,bg=default

# Active tab colours
setw -g window-status-current-style fg=colour16,bg=magenta

# Tmux command input box colours
set -g message-style fg=colour16,bg=magenta

# Tab title format
setw -g window-status-current-format '#{?window_zoomed_flag,#[bg=white],} #I: #W #{?window_zoomed_flag,[+],}'
set -g window-status-format '#I: #W #{?window_zoomed_flag,[+],}'

# Left status bar text
set -g status-left ' '

# Right status bar length
set -g status-right-length 80

# Refresh status-left and status-right more frequently than default
set -g status-interval 5

# Status bar widgets
CLOCK='#[fg=colour2]#(date +%I)#[fg=colour240]:#[fg=colour2]#(date +%M) #(if [ `date +%p` = "AM" ]; then echo \#[fg=colour2]; else echo \#[fg=colour240]; fi)#(date +%p)'
UPTIME='#[fg=colour240]up #(uptime -p | cut -d " " -f2- | tr -d , | sed -E "s;([0-9]+);#[fg=colour2]\1#[fg=colour240];g")'
PANE_PATH='#[fg=colour3]#(echo "#{pane_current_path}" | rev | cut -d/ -f1-2 | rev)'
WHOAMI='#[fg=colour5]#(echo $USER)#[fg=colour240]@#[fg=colour2]#(echo $HOSTNAME)'
DIVIDER='#[fg=colour240]|#[fg=default]'
COLON='#[fg=colour240]:'

# Set status bar layout based on client size
set-hook -g client-resized {
  if -F '#{e|<:#{client_width},100}' {
    if -F '#{!=:#{@status-mode},mobile-portrait}' {
      set -g @status-mode mobile-portrait
      set -g status 2
      set -g status-right ''
      set -g status-format[1] "#[align=right] $WHOAMI$COLON$PANE_PATH$DIVIDER$CLOCK"
    }
  } {
    if -F '#{e|<:#{client_width},200}' {
      if -F '#{!=:#{@status-mode},mobile-landscape}' {
        set -g @status-mode mobile-landscape
        set -g status 2
        set -g status-right ''
        set -g status-format[1] "#[align=left] $UPTIME#[align=right] $WHOAMI$COLON$PANE_PATH$DIVIDER$CLOCK"
      }
    } {
      if -F '#{!=:#{@status-mode},desktop}' {
        set -g @status-mode desktop
        set -g status on
        set -g status-right " $WHOAMI$COLON$PANE_PATH$DIVIDER$CLOCK"
      }
    }
  }
}

set-hook -g client-attached 'set-hook -R client-resized'
set-hook -R client-resized

# Set prefix to Alt + A
set -g prefix M-a

# Send prefix to inner tmux session with Prefix + A
bind M-a send-prefix

# Send prefix to inner tmux session with Alt + Z
bind -n M-z send-prefix

# Open command prompt with Prefix + :
bind : command-prompt

# Open buffer list with Prefix + =
bind = choose-buffer

# Move to last window with Prefix + -
bind - last-window

# Toggle pane border titles with Prefix + B
bind b setw -t . pane-border-status

# Enter copy mode with Prefix + C
bind c copy-mode

# Use u and d for half-page scrolling in copy mode
bind -T copy-mode-vi u send-keys -X halfpage-up
bind -T copy-mode-vi d send-keys -X halfpage-down

# Move pane to window with Prefix + M
bind m if -F '#{e|<:#{session_windows},10}' {
  command-prompt -1 -p '》move to window:' 'join-pane -t :%%'
} {
  command-prompt -p '》move to window:' 'join-pane -t :%%'
}

# Detach with Prefix + D
bind d detach-client

# Detach session with Prefix + Shift + D
bind D detach

# Reload tmux config with Prefix + R
bind r {
  source-file $HOME/.tmux.conf
  display-message " 》tmux config reloaded "
}

# Open session viewer with Prefix + S
bind s choose-session

# Toggle status bar visibility with Prefix + Shift + S
bind S set status

# Open time with Prefix + T
bind t clock-mode

# Use Ctrl + Alt + Arrow keys to switch windows
bind -n M-C-Right next-window
bind -n M-C-Left previous-window

# Use Ctrl + Alt + Vim keys to switch windows
bind -n M-C-l next-window
bind -n M-C-h previous-window

# Use Alt + < / > to switch windows
bind -n M-< previous-window
bind -n M-> next-window

# Use Alt + _ to move to last window
bind -n M-_ last-window

# Use Ctrl + Arrow keys to create a new pane in the given direction
bind -n C-Left split-window -hb -c '#{pane_current_path}'
bind -n C-Up split-window -vb -c '#{pane_current_path}'
bind -n C-Right split-window -h -c '#{pane_current_path}'
bind -n C-Down split-window -v -c '#{pane_current_path}'

# Use Prefix + Vim keys to create a new pane in the given direction
bind h split-window -hb -c '#{pane_current_path}'
bind j split-window -v  -c '#{pane_current_path}'
bind k split-window -vb -c '#{pane_current_path}'
bind l split-window -h  -c '#{pane_current_path}'

# Use Alt + Arrow keys to switch panes
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Use Alt + Vim keys to switch panes
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# Use Alt + Shift + Arrow keys to resize panes
bind -n M-S-Up resize-pane -U 5
bind -n M-S-Down resize-pane -D 5
bind -n M-S-Left resize-pane -L 5
bind -n M-S-Right resize-pane -R 5

# Use Alt + Shift + Vim keys to resize panes
bind -n M-H resize-pane -L 5
bind -n M-J resize-pane -D 5
bind -n M-K resize-pane -U 5
bind -n M-L resize-pane -R 5

# Use Prefix + N to move to window N
bind 0 select-window -t :0
bind 1 select-window -t :1
bind 2 select-window -t :2
bind 3 select-window -t :3
bind 4 select-window -t :4
bind 5 select-window -t :5
bind 6 select-window -t :6
bind 7 select-window -t :7
bind 8 select-window -t :8
bind 9 select-window -t :9

# Use Alt + N to move to window N
bind -n M-0 select-window -t :0
bind -n M-1 select-window -t :1
bind -n M-2 select-window -t :2
bind -n M-3 select-window -t :3
bind -n M-4 select-window -t :4
bind -n M-5 select-window -t :5
bind -n M-6 select-window -t :6
bind -n M-7 select-window -t :7
bind -n M-8 select-window -t :8
bind -n M-9 select-window -t :9

# Use Alt + ` to open scratchpad
bind -n M-` if '[ $(tmux display-message -p -F "#{session_name}") = popup ]' {
  detach-client
} {
  popup -d '#{pane_current_path}' -xC -yC -w75% -h75% -E 'tmux new -A -s popup'
}

# Use Alt + E to rotate panes
bind -n M-e rotate-window -D

# Use Alt + Shift + E to cycle layout
bind -n M-E next-layout

# Use Alt + Enter to zoom current pane
bind -n M-enter resize-pane -Z

# Use Alt + N to create a new window
bind -n M-n new-window -c '#{pane_current_path}'

# Use Alt + Shift + N to move window to the end
bind -n M-N move-window -t 999

# Use Alt + S to split out pane to a new window
bind -n M-s break-pane

# Use Alt + Q to close current pane
bind -n M-q kill-pane

# Use Alt + Shift + Q to close current window
bind -n M-Q kill-window

# Use Alt + V to paste most recent tmux buffer
bind -n M-v paste-buffer

# Use Ctrl + J to send Enter
bind -n C-j send-keys Enter

# Bind home and end keys explicitly
bind -n Home send-key C-a
bind -n End send-key C-e

# Use Ctrl + Space to toggle remote tmux session focus on
bind -n C-Space {
  set key-table remote-session
  set prefix None
  set status off
  if -F '#{pane_in_mode}' 'send-keys -X cancel'
  refresh-client -S
}

# Use Ctrl + Space to toggle remote tmux session focus off
bind -T remote-session C-Space {
  set -u key-table
  set -u prefix
  set -u window-status-current-style
  set status on
  refresh-client -S
}

# Use Ctrl + Alt + Space to toggle status position
bind-key -n C-M-Space if -F "#{==:#{status-position},bottom}" {
  set -g status-position top
} {
  set -g status-position bottom
}

# Enable tmux plugins
set -g @plugin sabrehagen/tmux-fingers
set -g @plugin nhdaly/tmux-better-mouse-mode
set -g @plugin ofirgall/tmux-window-name
set -g @plugin sabrehagen/tmux-jump
set -g @plugin tmux-plugins/tmux-copycat

# Configure tmux-fingers plugin
set -g @fingers-install-binary 1
set -g @fingers-key f

# Configure tmux-jump plugin
set -g @jump-key J

# Configure tmux-window-name plugin
set -g @tmux_window_name_dir_programs "['claude']"
set -g @tmux_window_name_max_name_len 26
set -g @tmux_window_name_substitute_sets "[('.*/data/data/com.termux/files/usr/bin/', r''),('^(npm run|npm exec|vcsh) (.+)', r'\\g<2>'),(' --dangerously-skip-permissions', r''),('.*ssh[a] [^@]+@(.+)', r'ssh \\g<1>'),('^batcat.*\\s(?!--?)\\S*/([^/\\s]+)$|^batcat\\s+(?!--?)([^/\\s]+)$', r'cat:\\g<1>\\g<2>'),(HOME_DIR + '/', '~/'),('^nano.*\\s(?!--?)(?:\\S*/)?([^/\\s]+)$', r'nano:\\g<1>'),('^/usr/bin/', r'')]"
set -g @tmux_window_name_use_tilde True

# Install tmux plugin manager if not installed
if 'test ! -d $HOME/.tmux/plugins/tpm' {
  run 'git clone https://github.com/tmux-plugins/tpm $HOME/.tmux/plugins/tpm'
  run '$HOME/.tmux/plugins/tpm/bin/install_plugins'
}

# Install libtmux dependency for tmux-window-name if not installed
if '! python3 -m pip show libtmux' {
  run 'DEBIAN_FRONTEND=noninteractive sudo apt-get install -qq python3-libtmux >/dev/null 2>&1'
  run '($TMUX_PLUGIN_MANAGER_PATH/tmux-window-name/scripts/rename_session_windows.py >/dev/null 2>&1 &)'
}

# Initialize tmux plugin manager
run -b $HOME/.tmux/plugins/tpm/tpm
